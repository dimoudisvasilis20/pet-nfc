<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<title>Χαμένα κατοικίδια κοντά μου</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="app-shell">

<div class="app-sidebar">
<a class="brand" href="/dashboard.html"><img class="brand-mark" src="/img/brand-mark.svg" alt="" width="22" height="22"> PawTrace</a>
<div class="nav-links">
<a href="/dashboard.html">🐾 Τα κατοικίδιά μου</a>
<a href="/calendar.html">📅 Ημερολόγιο</a>
<a href="/add-pet.html">➕ Προσθήκη κατοικιδίου</a>
<a href="/lost-pets.html" class="active">🔎 Χαμένα κοντά μου</a>
<a href="/scans.html">📍 Τελευταίες σαρώσεις</a>
<a href="/notifications.html">🔔 Ειδοποιήσεις</a>
<a href="/account.html">👤 Λογαριασμός</a>
</div>
</div>

<div class="app-main">

<div class="page-topbar">
<a class="brand" href="/dashboard.html"><img class="brand-mark" src="/img/brand-mark.svg" alt="" width="22" height="22"> PawTrace</a>
<button class="btn btn-outline btn-auto" onclick="logout()">🚪 Αποσύνδεση</button>
</div>

<div class="page">

<h1>🔎 Χαμένα κατοικίδια κοντά μου</h1>

<div class="filter-row">
<span>Ακτίνα:</span>
<select id="radius" onchange="loadNearby()">
<option value="5">5 χλμ</option>
<option value="10" selected>10 χλμ</option>
<option value="20">20 χλμ</option>
<option value="50">50 χλμ</option>
</select>
</div>

<div id="results">Φόρτωση...</div>

</div>
</div>

</div>

<script>

async function logout(){

    if(!confirm("Είστε σίγουρος ότι θέλετε να αποσυνδεθείτε;")){
        return;
    }

    await fetch("/logout", { method: "POST" });
    window.location.href = "/login.html";

}

let myPosition = null;

function loadNearby(){

if(!myPosition){

return;

}

const radiusKm = document.getElementById("radius").value;

fetch(`/pets/lost/nearby?lat=${myPosition.lat}&lng=${myPosition.lng}&radiusKm=${radiusKm}`)

.then(response => response.json())

.then(pets => {

const container = document.getElementById("results");

if(pets.length === 0){

container.innerHTML = `<p class="empty-state">Δεν υπάρχουν αναφορές χαμένων κατοικιδίων σε αυτή την ακτίνα.</p>`;

return;

}

let html = "";

pets.forEach(pet => {

html += `

<div class="card pet-card">

${pet.photo ? `<img class="pet-card-photo" src="${pet.photo}" alt="${pet.name}">` : `<div class="pet-card-photo-placeholder">🐾</div>`}

<div class="pet-card-body">

<div class="pet-name">🐾 ${pet.name}</div>

<div class="distance">${pet.species || ""} ${pet.breed ? "· " + pet.breed : ""} · ${pet.distance_km.toFixed(1)} χλμ μακριά</div>

</div>

</div>

`;

});

container.innerHTML = html;

})

.catch(() => {

document.getElementById("results").innerHTML =

`<p class="empty-state">Κάτι πήγε στραβά κατά τη φόρτωση.</p>`;

});

}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition((position) => {

myPosition = {

lat: position.coords.latitude,

lng: position.coords.longitude

};

loadNearby();

}, () => {

document.getElementById("results").innerHTML =

`<p class="empty-state">Χρειάζεται πρόσβαση στην τοποθεσία σου για να δεις χαμένα κατοικίδια κοντά σου.</p>`;

});

}
else{

document.getElementById("results").innerHTML =

`<p class="empty-state">Ο browser σου δεν υποστηρίζει τοποθεσία.</p>`;

}

</script>

<script src="/js/sidebar-toggle.js"></script>

</body>

</html>
