<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<title>Λογαριασμός</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="app-shell">

<div class="app-sidebar">
<a class="brand" href="/dashboard.html">🐾 Pet NFC</a>
<div class="nav-links">
<a href="/dashboard.html">🐾 Τα κατοικίδιά μου</a>
<a href="/calendar.html">📅 Ημερολόγιο</a>
<a href="/add-pet.html">➕ Προσθήκη κατοικιδίου</a>
<a href="/lost-pets.html">🔎 Χαμένα κοντά μου</a>
<a href="/scans.html">📍 Τελευταίες σαρώσεις</a>
<a href="/notifications.html">🔔 Ειδοποιήσεις</a>
<a href="/account.html" class="active">👤 Λογαριασμός</a>
</div>
</div>

<div class="app-main">

<div class="page-topbar">
<button class="btn btn-outline btn-auto" onclick="logout()">🚪 Αποσύνδεση</button>
</div>

<div class="page page-wide">

<h1>👤 Λογαριασμός</h1>

<div class="two-col">

<div class="card">

<h2>Στοιχεία προφίλ</h2>

<div class="field">
<label for="first_name">Όνομα</label>
<input id="first_name">
</div>

<div class="field">
<label for="last_name">Επώνυμο</label>
<input id="last_name">
</div>

<div class="field">
<label for="email">Email</label>
<input id="email">
</div>

<div class="field">
<label for="phone">Τηλέφωνο</label>
<input id="phone">
</div>

<button class="btn btn-auto" onclick="saveProfile()">Αποθήκευση στοιχείων</button>

<p id="profile-result" class="result-msg"></p>

</div>

<div class="card">

<h2>Αλλαγή κωδικού</h2>

<div class="field">
<label for="current_password">Τρέχων κωδικός</label>
<input id="current_password" type="password">
</div>

<div class="field">
<label for="new_password">Νέος κωδικός</label>
<input id="new_password" type="password">
</div>

<div class="field">
<label for="confirm_password">Επιβεβαίωση νέου κωδικού</label>
<input id="confirm_password" type="password">
</div>

<button class="btn btn-auto" onclick="changePassword()">Αλλαγή κωδικού</button>

<p id="password-result" class="result-msg"></p>

</div>

</div>

<div class="card">

<h2>⚠ Διαγραφή λογαριασμού</h2>

<p>Η διαγραφή είναι οριστική και θα αφαιρέσει όλα τα κατοικίδια, τα tags και τα δεδομένα σου.</p>

<div class="field">
<label for="delete_password">Κωδικός για επιβεβαίωση</label>
<input id="delete_password" type="password">
</div>

<button class="btn btn-danger btn-auto" onclick="deleteAccount()">Διαγραφή λογαριασμού</button>

<p id="delete-result" class="result-msg"></p>

</div>

</div>
</div>

</div>

<script>

async function logout(){

    if(!confirm("Είστε σίγουρος ότι θέλετε να αποσυνδεθείτε;")){
        return;
    }

    await fetch("/logout", { method: "POST" });
    window.location.href = "/login.html";

}

async function loadProfile(){

    const response = await fetch("/me");

    if(response.status === 401){
        window.location.href = "/login.html";
        return;
    }

    const user = await response.json();

    document.getElementById("first_name").value = user.first_name || "";
    document.getElementById("last_name").value = user.last_name || "";
    document.getElementById("email").value = user.email || "";
    document.getElementById("phone").value = user.phone || "";

}

loadProfile();

async function saveProfile(){

    const data = {
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
    };

    const response = await fetch("/me", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.text();

    const profileEl = document.getElementById("profile-result");
    profileEl.className = response.ok ? "result-msg success" : "result-msg error";
    profileEl.innerHTML = response.ok ? "✅ Τα στοιχεία ενημερώθηκαν" : result;

}

async function changePassword(){

    const current_password = document.getElementById("current_password").value;
    const new_password = document.getElementById("new_password").value;
    const confirm_password = document.getElementById("confirm_password").value;

    const passwordEl = document.getElementById("password-result");

    if(new_password !== confirm_password){
        passwordEl.className = "result-msg error";
        passwordEl.innerHTML = "Οι νέοι κωδικοί δεν ταιριάζουν";
        return;
    }

    const response = await fetch("/me/password", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ current_password, new_password })
    });

    const result = await response.text();

    if(response.ok){

        passwordEl.className = "result-msg success";
        passwordEl.innerHTML = "✅ Ο κωδικός άλλαξε";
        document.getElementById("current_password").value = "";
        document.getElementById("new_password").value = "";
        document.getElementById("confirm_password").value = "";

    }
    else{

        passwordEl.className = "result-msg error";
        passwordEl.innerHTML = result;

    }

}

async function deleteAccount(){

    if(!confirm("Σίγουρα θέλεις να διαγράψεις οριστικά τον λογαριασμό σου;")){
        return;
    }

    const password = document.getElementById("delete_password").value;

    const response = await fetch("/me", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
    });

    if(response.ok){

        window.location.href = "/login.html";

    }
    else{

        const result = await response.text();
        const el = document.getElementById("delete-result");
        el.className = "result-msg error";
        el.innerHTML = result;

    }

}

</script>

</body>
</html>
