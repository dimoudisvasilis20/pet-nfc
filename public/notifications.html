<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="app-shell">

<div class="app-sidebar">
<a class="brand" href="/dashboard.html"><img class="brand-mark" src="/img/brand-mark.svg" alt="" width="22" height="22"> PawTrace</a>
<div class="nav-links">
<a href="/dashboard.html">🐾 Τα κατοικίδιά μου</a>
<a href="/calendar.html">📅 Ημερολόγιο</a>
<a href="/add-pet.html">➕ Προσθήκη κατοικιδίου</a>
<a href="/lost-pets.html">🔎 Χαμένα κοντά μου</a>

<a href="/account.html">👤 Λογαριασμός</a>
</div>
</div>

<div class="app-main">

<div class="page-topbar">
<a class="brand" href="/dashboard.html"><img class="brand-mark" src="/img/brand-mark.svg" alt="" width="22" height="22"> PawTrace</a>
<button class="btn btn-outline btn-auto" onclick="logout()">🚪 Αποσύνδεση</button>
</div>

<div class="page">

<h1>🔔 Ειδοποιήσεις</h1>

<div class="card">
<div id="notifications">Φόρτωση...</div>
</div>

</div>
</div>

<div id="location-choice-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100;">
<div style="background:var(--color-surface,#fff);border-radius:var(--radius,12px);padding:24px;max-width:320px;width:90%;text-align:center;">
<p style="margin:0 0 16px;font-weight:600;">Πώς θέλεις να ανοίξεις την τοποθεσία;</p>
<div style="display:flex;flex-direction:column;gap:8px;">
<button class="btn" onclick="openLocationChoice('native')">🗺️ Χάρτες</button>
<button class="btn btn-outline" onclick="openLocationChoice('browser')">🌐 Browser</button>
<button class="btn btn-outline" onclick="closeLocationChoice()">Άκυρο</button>
</div>
</div>
</div>

</div>

<script>

async function logout(){

    if(!confirm("Είστε σίγουρος ότι θέλετε να αποσυνδεθείτε;")){
        return;
    }

    await fetch("/logout", { method: "POST" });
    window.location.href = "/login.html";

}

// Keyed by notification id, populated while rendering — lets openNotification(id)
// see the notification's data payload (e.g. lat/lng) without re-fetching it.
const notificationData = {};
let pendingLocation = null;

async function loadNotifications(){

    const response = await fetch("/notifications");

    if(response.status === 401){
        window.location.href = "/login.html";
        return;
    }

    const notifications = await response.json();

    if(notifications.length === 0){
        document.getElementById("notifications").innerHTML =
            `<p class="empty-state">Δεν υπάρχουν ειδοποιήσεις.</p>`;
        return;
    }

    let html = "";

    notifications.forEach(n => {

        // Keep each notification's data payload around so openNotification(id)
        // can branch on type (e.g. show the maps/browser choice) — the render
        // loop is the only place we have it, since the DOM row itself only
        // carries the id via its onclick handler.
        notificationData[n.id] = n.data || null;

        // Clicking the row now opens the maps/browser choice dialog itself
        // (see openNotification), so a separate inline map link would just
        // be a second, inconsistent way to do the same thing.
        const mapLink = (n.data && n.data.type === "location_shared" && n.data.lat && n.data.lng)
            ? `<br><span class="distance">📍 Πάτησε για άνοιγμα τοποθεσίας</span>`
            : "";

        html += `

<div class="notification ${n.is_read ? "read" : "unread"}" onclick="openNotification(${n.id})">

🔔 ${n.title}

<br>

${n.message}

${mapLink}

<br>

<span class="distance">${n.created_at ? new Date(n.created_at).toLocaleString("el-GR") : ""}</span>

</div>

`;

    });

    document.getElementById("notifications").innerHTML = html;

}

async function openNotification(id){

    const notification = document.querySelector(`[onclick="openNotification(${id})"]`);

    if(notification && notification.classList.contains("unread")){

        notification.classList.remove("unread");
        notification.classList.add("read");

        await fetch(`/notifications/${id}/read`, { method: "PUT" });

    }

    const data = notificationData[id];

    if(!data) return;

    if(data.type === "location_shared" && data.lat && data.lng){

        pendingLocation = { lat: data.lat, lng: data.lng };
        document.getElementById("location-choice-overlay").style.display = "flex";
        return;

    }

    if(data.type === "nfc_scan"){
        window.location.href = "/scans.html";
        return;
    }

    if(data.type === "lost_nearby"){
        window.location.href = "/lost-pets.html";
        return;
    }

    // Anything else (calendar_reminder, or an unrecognized future type)
    // has nowhere more specific to go — stay on this page.

}

function closeLocationChoice(){

    pendingLocation = null;
    document.getElementById("location-choice-overlay").style.display = "none";

}

function openLocationChoice(mode){

    if(!pendingLocation) return;

    const { lat, lng } = pendingLocation;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const nativeUrl = isIOS ? `maps://?q=${lat},${lng}` : `geo:${lat},${lng}?q=${lat},${lng}`;
    const webUrl = `https://www.google.com/maps?q=${lat},${lng}`;

    window.open(mode === "native" ? nativeUrl : webUrl, "_blank");

    closeLocationChoice();

}

loadNotifications();

</script>

<script src="/js/sidebar-toggle.js"></script>

</body>
</html>
