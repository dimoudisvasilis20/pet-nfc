<body class="admin-body">

<div class="sidebar">

<h2 class="brand-h2"><svg class="brand-mark" viewBox="0 0 100 100" width="22" height="22" aria-hidden="true"><mask id="pc"><rect width="100" height="100" fill="#fff"/><ellipse cx="50" cy="52" rx="14" ry="10.5" fill="#000"/><circle cx="36" cy="35" r="7" fill="#000"/><circle cx="50" cy="27" r="7.5" fill="#000"/><circle cx="64" cy="35" r="7" fill="#000"/></mask><path d="M50 8 C30 8 15 23 15 43 C15 60 28 72 42 88 L47 95 C48.5 97 51.5 97 53 95 L58 88 C72 72 85 60 85 43 C85 23 70 8 50 8 Z" fill="currentColor" mask="url(#pc)"/></svg> Chnari</h2>

</div>

<div class="admin-content">

<div class="admin-toolbar">
<h1>🐕 Pets</h1>
</div>

<div class="table-scroll">
<table class="data-table">
<thead>
<tr>
<th></th>
<th>Όνομα</th>
<th>Είδος / Φυλή</th>
<th>Ιδιοκτήτης</th>
<th>Κατάσταση</th>
<th>Δημιουργήθηκε</th>
</tr>
</thead>
<tbody id="pets-body">
</tbody>
</table>
</div>

<div id="empty-state" class="empty-state" style="display:none;">Δεν υπάρχουν κατοικίδια.</div>

</div>

<script>

async function loadPets() {

    const response = await fetch("/admin/pets");

    if (response.status === 401 || response.status === 403) {
        location.href = "../login.html";
        return;
    }

    const pets = await response.json();
    const tbody = document.getElementById("pets-body");
    const emptyState = document.getElementById("empty-state");

    if (pets.length === 0) {
        emptyState.style.display = "block";
        return;
    }

    tbody.innerHTML = pets.map((pet) => `
        <tr>
            <td>${pet.photo
                ? `<img src="${pet.photo}" alt="" style="width:36px;height:36px;border-radius:8px;object-fit:cover;">`
                : `<span style="font-size:20px;">🐾</span>`
            }</td>
            <td>${pet.name}</td>
            <td>${[pet.species, pet.breed].filter(Boolean).join(" · ") || "—"}</td>
            <td>${pet.first_name} ${pet.last_name}</td>
            <td>${pet.is_lost
                ? `<span class="status-badge status-lost">Χαμένο</span>`
                : `<span class="status-badge status-active">OK</span>`
            }</td>
            <td>${new Date(pet.created_at).toLocaleDateString("el-GR")}</td>
        </tr>
    `).join("");

}

loadPets();

</script>

</body>

</html>
