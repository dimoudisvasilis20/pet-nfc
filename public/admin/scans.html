<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Scans — Pet NFC Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<link rel="stylesheet" href="../css/style.css">

</head>

<body class="admin-body">

<div class="sidebar">

<h2>🐾 Pet NFC</h2>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="users.html">👥 Users</a>

<a href="pets.html">🐕 Pets</a>

<a href="tags.html">🏷 NFC Tags</a>

<a href="scans.html" class="active">📍 Scans</a>

<a href="notifications.html">🔔 Notifications</a>

<a href="#">⚙ Settings</a>

</div>

<div class="admin-content">

<div class="admin-toolbar">
<h1>📍 Scan history</h1>
</div>

<div class="table-scroll">
<table class="data-table">
<thead>
<tr>
<th>Κατοικίδιο</th>
<th>Ιδιοκτήτης</th>
<th>Συσκευή</th>
<th>Πρόγραμμα περιήγησης</th>
<th>Ώρα</th>
</tr>
</thead>
<tbody id="scans-body">
</tbody>
</table>
</div>

<div id="empty-state" class="empty-state" style="display:none;">Δεν υπάρχουν σαρώσεις ακόμα.</div>

</div>

<script>

async function loadScans() {

    const response = await fetch("/admin/scans");

    if (response.status === 401 || response.status === 403) {
        location.href = "../login.html";
        return;
    }

    const scans = await response.json();
    const tbody = document.getElementById("scans-body");
    const emptyState = document.getElementById("empty-state");

    if (scans.length === 0) {
        emptyState.style.display = "block";
        return;
    }

    tbody.innerHTML = scans.map((scan) => `
        <tr>
            <td>${scan.pet_name}</td>
            <td>${scan.first_name} ${scan.last_name}</td>
            <td>${scan.device || "—"}</td>
            <td>${scan.browser || "—"}</td>
            <td>${new Date(scan.scanned_at).toLocaleString("el-GR")}</td>
        </tr>
    `).join("");

}

loadScans();

</script>

</body>

</html>
