<body class="admin-body">

<div class="sidebar">

<h2 class="brand-h2"><svg class="brand-mark" viewBox="0 0 100 100" width="22" height="22" aria-hidden="true"><mask id="pc"><rect width="100" height="100" fill="#fff"/><ellipse cx="50" cy="52" rx="14" ry="10.5" fill="#000"/><circle cx="36" cy="35" r="7" fill="#000"/><circle cx="50" cy="27" r="7.5" fill="#000"/><circle cx="64" cy="35" r="7" fill="#000"/></mask><path d="M50 8 C30 8 15 23 15 43 C15 60 28 72 42 88 L47 95 C48.5 97 51.5 97 53 95 L58 88 C72 72 85 60 85 43 C85 23 70 8 50 8 Z" fill="currentColor" mask="url(#pc)"/></svg> Chnari</h2>

<a href="dashboard.html" class="active">🏠 Dashboard</a>

</div>

<div class="admin-content">

<h1>Admin Dashboard</h1>

<p>Καλώς ήρθες διαχειριστή.</p>

<div class="stat-grid">

<div class="stat-card">

Users

<div class="number" id="users">0</div>

</div>

<div class="stat-card">

Pets

<div class="number" id="pets">0</div>

</div>

<div class="stat-card">

NFC Tags

<div class="number" id="tags">0</div>

</div>

<div class="stat-card">

Today's Scans

<div class="number" id="scans">0</div>

</div>

</div>

</div>

<script>

async function loadStats(){

    const response = await fetch("/admin/stats");

    if (response.status === 401 || response.status === 403) {
        location.href = "../login.html";
        return;
    }

    const data = await response.json();

    document.getElementById("users").textContent = data.users;
    document.getElementById("pets").textContent = data.pets;
    document.getElementById("tags").textContent = data.tags;
    document.getElementById("scans").textContent = data.scans;

}

loadStats();

</script>

</body>
