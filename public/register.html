<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<title>Chnari — Εγγραφή</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="auth-wrapper">
<div class="auth-shell">

<div class="auth-hero">
<h2 class="brand-h2"><svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true"><mask id="pc"><rect width="100" height="100" fill="#fff"/><ellipse cx="50" cy="52" rx="14" ry="10.5" fill="#000"/><circle cx="36" cy="35" r="7" fill="#000"/><circle cx="50" cy="27" r="7.5" fill="#000"/><circle cx="64" cy="35" r="7" fill="#000"/></mask><path d="M50 8 C30 8 15 23 15 43 C15 60 28 72 42 88 L47 95 C48.5 97 51.5 97 53 95 L58 88 C72 72 85 60 85 43 C85 23 70 8 50 8 Z" fill="currentColor" mask="url(#pc)"/></svg> Chnari</h2>
<p>Γίνε μέλος — δημιούργησε λογαριασμό, πρόσθεσε τα κατοικίδιά σου και ενεργοποίησε τα NFC tags τους μέσα σε λίγα λεπτά.</p>
</div>

<div class="auth-form-side">
<div class="auth-card">

<div class="auth-brand-mobile"><svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true"><mask id="pcm"><rect width="100" height="100" fill="#fff"/><ellipse cx="50" cy="52" rx="14" ry="10.5" fill="#000"/><circle cx="36" cy="35" r="7" fill="#000"/><circle cx="50" cy="27" r="7.5" fill="#000"/><circle cx="64" cy="35" r="7" fill="#000"/></mask><path d="M50 8 C30 8 15 23 15 43 C15 60 28 72 42 88 L47 95 C48.5 97 51.5 97 53 95 L58 88 C72 72 85 60 85 43 C85 23 70 8 50 8 Z" fill="currentColor" mask="url(#pcm)"/></svg> Chnari</div>

<h1>Δημιουργία λογαριασμού</h1>

<div class="field">
<label for="first_name">Όνομα</label>
<input id="first_name" placeholder="Όνομα">
</div>

<div class="field">
<label for="last_name">Επώνυμο</label>
<input id="last_name" placeholder="Επώνυμο">
</div>

<div class="field">
<label for="email">Email</label>
<input id="email" placeholder="Email">
</div>

<div class="field">
<label for="phone">Τηλέφωνο</label>
<input id="phone" placeholder="Τηλέφωνο">
</div>

<div class="field">
<label for="password">Κωδικός</label>
<input id="password" type="password" placeholder="Κωδικός">
</div>

<button class="btn" onclick="register()">Εγγραφή</button>

<p id="result" class="result-msg"></p>

<p class="subtext">Έχεις ήδη λογαριασμό; <a href="/login.html">Σύνδεση</a></p>

</div>
</div>

</div>
</div>

<script>

async function register(){

    const data={
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    };

    const response = await fetch("/register",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(data)
    });

    const text = await response.text();

    const resultEl = document.getElementById("result");
    resultEl.className = response.ok ? "result-msg success" : "result-msg error";
    resultEl.innerHTML = text;

}

</script>

</body>
</html>
