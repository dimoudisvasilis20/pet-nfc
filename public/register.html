<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<title>PawTrace — Εγγραφή</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="auth-wrapper">
<div class="auth-shell">

<div class="auth-hero">
<h2 class="brand-h2"><img class="brand-mark" src="/img/brand-mark.svg" alt=""> PawTrace</h2>
<p>Γίνε μέλος — δημιούργησε λογαριασμό, πρόσθεσε τα κατοικίδιά σου και ενεργοποίησε τα NFC tags τους μέσα σε λίγα λεπτά.</p>
</div>

<div class="auth-form-side">
<div class="auth-card">

<div class="auth-brand-mobile"><img class="brand-mark" src="/img/brand-mark.svg" alt=""> PawTrace</div>

<h1>Δημιουργία λογαριασμού</h1>

<div class="field">
<label for="first_name">Όνομα</label>
<input id="first_name" placeholder="Όνομα">
</div>

<div class="field">
<label for="last_name">Επώνυμο</label>
<input id="last_name" placeholder="Επώνυμο">
</div>

<div class="field">
<label for="email">Email</label>
<input id="email" placeholder="Email">
</div>

<div class="field">
<label for="phone">Τηλέφωνο</label>
<input id="phone" placeholder="Τηλέφωνο">
</div>

<div class="field">
<label for="password">Κωδικός</label>
<input id="password" type="password" placeholder="Κωδικός">
</div>

<label class="terms-check">
<input type="checkbox" id="terms_accept">
<span>Αποδέχομαι τους <a href="/terms.html" target="_blank" rel="noopener">Όρους Χρήσης</a> και την <a href="/privacy.html" target="_blank" rel="noopener">Πολιτική Απορρήτου</a></span>
</label>

<button class="btn" onclick="register()">Εγγραφή</button>

<p id="result" class="result-msg"></p>

<div class="auth-divider"><span>ή</span></div>

<a href="/auth/google" class="btn btn-outline btn-google">
<img src="/img/google-icon.svg" alt="" width="18" height="18"> Εγγραφή με Google
</a>

<p class="subtext">Έχεις ήδη λογαριασμό; <a href="/login.html">Σύνδεση</a></p>

</div>
</div>

</div>
</div>

<script>

async function register(){

    const resultEl = document.getElementById("result");

    if(!document.getElementById("terms_accept").checked){
        resultEl.className = "result-msg error";
        resultEl.innerHTML = "Χρειάζεται να αποδεχτείς τους Όρους Χρήσης και την Πολιτική Απορρήτου";
        return;
    }

    const data={
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value
    };

    const response = await fetch("/register",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(data)
    });

    const text = await response.text();

    resultEl.className = response.ok ? "result-msg success" : "result-msg error";
    resultEl.innerHTML = response.ok
        ? "Ο λογαριασμός δημιουργήθηκε! Έλεγξε το email σου για να τον επιβεβαιώσεις."
        : text;

}

</script>

</body>
</html>
