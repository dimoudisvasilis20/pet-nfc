<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<title>PawTrace — Σύνδεση</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="auth-wrapper">
<div class="auth-shell">

<div class="auth-hero">
<h2 class="brand-h2"><img class="brand-mark" src="/img/brand-mark.svg" alt=""> PawTrace</h2>
<p>Το ψηφιακό προφίλ του κατοικιδίου σου, πάντα ένα σκανάρισμα μακριά. Καταχώρησε στοιχεία, ιατρικές πληροφορίες και μείνε συνδεδεμένος αν χαθεί.</p>
</div>

<div class="auth-form-side">
<div class="auth-card">

<div class="auth-brand-mobile"><img class="brand-mark" src="/img/brand-mark.svg" alt=""> PawTrace</div>

<h1>Σύνδεση</h1>

<div class="field">
<label for="email">Email</label>
<input id="email" placeholder="Email">
</div>

<div class="field">
<label for="password">Κωδικός</label>
<input id="password" type="password" placeholder="Κωδικός">
</div>

<button class="btn" onclick="login()">Σύνδεση</button>

<p id="result" class="result-msg"></p>

<div class="auth-divider"><span>ή</span></div>

<a href="/auth/google" class="btn btn-outline btn-google">
<img src="/img/google-icon.svg" alt="" width="18" height="18"> Σύνδεση με Google
</a>

<p class="subtext">Δεν έχεις λογαριασμό; <a href="/register.html">Εγγραφή</a></p>

</div>
</div>

</div>
</div>

<script>

async function login(){

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const response = await fetch("/login",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(data)
    });

    const resultEl = document.getElementById("result");

    if(response.ok){

        const result = await response.json();

        resultEl.className = "result-msg success";
        resultEl.innerHTML = "Καλώς ήρθες " + result.name;

        window.location.href = result.role === "admin" ? "/admin/dashboard.html" : "/dashboard.html";

    }
    else{

        // Login errors come back as plain text (res.send), not JSON.
        const message = await response.text();

        resultEl.className = "result-msg error";
        resultEl.innerHTML = message || "Λάθος στοιχεία";

    }

}

if(new URLSearchParams(window.location.search).get("error") === "google"){

    const resultEl = document.getElementById("result");
    resultEl.className = "result-msg error";
    resultEl.innerHTML = "Η σύνδεση με Google απέτυχε. Δοκίμασε ξανά.";

}

</script>

</body>
</html>
