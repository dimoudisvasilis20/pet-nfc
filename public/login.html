<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<title>Chnari — Σύνδεση</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="auth-wrapper">
<div class="auth-shell">

<div class="auth-hero">
<div class="emoji">🐕</div>
<h2 class="brand-h2"><svg class="brand-mark" viewBox="0 0 100 100" width="22" height="22" aria-hidden="true"><mask id="pc"><rect width="100" height="100" fill="#fff"/><ellipse cx="50" cy="52" rx="14" ry="10.5" fill="#000"/><circle cx="36" cy="35" r="7" fill="#000"/><circle cx="50" cy="27" r="7.5" fill="#000"/><circle cx="64" cy="35" r="7" fill="#000"/></mask><path d="M50 8 C30 8 15 23 15 43 C15 60 28 72 42 88 L47 95 C48.5 97 51.5 97 53 95 L58 88 C72 72 85 60 85 43 C85 23 70 8 50 8 Z" fill="currentColor" mask="url(#pc)"/></svg> Chnari</h2>
<p>Το ψηφιακό προφίλ του κατοικιδίου σου, πάντα ένα σκανάρισμα μακριά. Καταχώρησε στοιχεία, ιατρικές πληροφορίες και μείνε συνδεδεμένος αν χαθεί.</p>
</div>

<div class="auth-form-side">
<div class="auth-card">

<h1>Σύνδεση</h1>

<div class="field">
<label for="email">Email</label>
<input id="email" placeholder="Email">
</div>

<div class="field">
<label for="password">Κωδικός</label>
<input id="password" type="password" placeholder="Κωδικός">
</div>

<button class="btn" onclick="login()">Σύνδεση</button>

<p id="result" class="result-msg"></p>

<p class="subtext">Δεν έχεις λογαριασμό; <a href="/register.html">Εγγραφή</a></p>

</div>
</div>

</div>
</div>

<script>

async function login(){

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const response = await fetch("/login",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(data)
    });

    const result = await response.json();

    const resultEl = document.getElementById("result");

    if(response.ok){

        resultEl.className = "result-msg success";
        resultEl.innerHTML = "Καλώς ήρθες " + result.name;

        window.location.href = result.role === "admin" ? "/admin/dashboard.html" : "/dashboard.html";

    }
    else{

        resultEl.className = "result-msg error";
        resultEl.innerHTML = "Λάθος στοιχεία";

    }

}

</script>

</body>
</html>
